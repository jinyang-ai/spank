<!DOCTYPE html>
<html>
<head>
    <style>
        .faq-item { border: 1px solid #ccc; margin: 10px; padding: 10px; }
        .faq-a { display: none; }
        .faq-item.open .faq-a { display: block; }
    </style>
</head>
<body>
    <div class="faq-item">
        <div class="faq-q" onclick="toggleFaq(this)">Question 1</div>
        <div class="faq-a">Answer 1</div>
    </div>
    <div class="faq-item">
        <div class="faq-q" onclick="toggleFaq(this)">Question 2</div>
        <div class="faq-a">Answer 2</div>
    </div>
    <div class="faq-item">
        <div class="faq-q" onclick="toggleFaq(this)">Question 3</div>
        <div class="faq-a">Answer 3</div>
    </div>
    
    <script>
        function toggleFaq(el) {
            const item = el.closest('.faq-item');
            const wasOpen = item.classList.contains('open');
            document.querySelectorAll('.faq-item').forEach(faq => faq.classList.remove('open'));
            if (!wasOpen) item.classList.add('open');
        }
    </script>
</body>
</html>
